; Same meshcomod companion stack as [env:heltec_v4_companion_radio_usb_tcp]: inject_wifi_env (WIFI_SSID/WIFI_PWD at build),
; MULTI_TRANSPORT (USB+TCP+WS+BLE), merge-bin. TFT+CHSC6x touch is the only hardware delta vs OLED.
[env:heltec_v4_tft_companion_radio_usb_tcp_touch]
extends = heltec_v4_tft_touch
extra_scripts = pre:scripts/inject_wifi_env.py, merge-bin.py
build_flags =
  ${heltec_v4_tft_touch.build_flags}
  -I examples/companion_radio/ui-new
  -D MAX_CONTACTS=350
  -D MAX_GROUP_CHANNELS=40
  -D DISPLAY_CLASS=ST7789LCDDisplay
  -D ADMIN_PASSWORD='"password"'
  -D MULTI_TRANSPORT_COMPANION=1
  -D TCP_PORT=5000
  -D WS_PORT=8765
  -D BLE_PIN_CODE=123456
  ; Plain ws:// only (no WSS): smaller image, more internal RAM for HTTPS OTA.
  -D CONFIG_MBEDTLS_ASYMMETRIC_CONTENT_LEN=1
  -D CONFIG_MBEDTLS_SSL_IN_CONTENT_LEN=16384
  -D CONFIG_MBEDTLS_SSL_OUT_CONTENT_LEN=4096
build_src_filter = ${heltec_v4_tft_touch.build_src_filter}
  +<helpers/ui/ST7789LCDDisplay.cpp>
  +<helpers/ui/MomentaryButton.cpp>
  +<helpers/input/HeltecV4CapTouch.cpp>
  +<helpers/esp32/*.cpp>
  +<../examples/companion_radio/*.cpp>
  +<../examples/companion_radio/ui-new/*.cpp>
lib_deps =
  ${heltec_v4_tft_touch.lib_deps}
  ${esp32_ota.lib_deps}
  densaugeo/base64 @ ~1.4.0

