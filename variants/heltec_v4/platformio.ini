; meshcomod: stock room mesh + USB + BLE + TCP + WebSocket (same transport stack as companion_radio_usb_tcp).
; Extends heltec_v4_oled (not *_room_server): PlatformIO resolves platform/framework when extra_scripts overrides the stock env chain.
[env:heltec_v4_room_server_multitransport]
extends = heltec_v4_oled
extra_scripts = pre:scripts/inject_wifi_env.py, merge-bin.py
build_flags =
  ${heltec_v4_oled.build_flags}
  -D DISPLAY_CLASS=SSD1306Display
  -D ADVERT_NAME='"Heltec Room"'
  -D ADVERT_LAT=0.0
  -D ADVERT_LON=0.0
  -D ADMIN_PASSWORD='"password"'
  -D ROOM_PASSWORD='"hello"'
  -D MESHCOMOD_ROOM_MULTITRANSPORT=1
  -D MAX_CONTACTS=350
  -D MAX_GROUP_CHANNELS=40
  -D TCP_PORT=5000
  -D WS_PORT=8765
  -D BLE_PIN_CODE=123456
  -D CONFIG_MBEDTLS_ASYMMETRIC_CONTENT_LEN=1
  -D CONFIG_MBEDTLS_SSL_IN_CONTENT_LEN=16384
  -D CONFIG_MBEDTLS_SSL_OUT_CONTENT_LEN=4096
build_src_filter = ${heltec_v4_oled.build_src_filter}
  +<helpers/ui/SSD1306Display.cpp>
  +<helpers/ui/MomentaryButton.cpp>
  +<../examples/simple_room_server>
  -<../examples/simple_room_server/main.cpp>
  +<../examples/room_server_meshcomod_multitransport/RoomMain.cpp>
  +<../examples/room_server_meshcomod_multitransport/RoomMultitransportFrames.cpp>
  +<../examples/room_server_meshcomod_multitransport/RoomOtaEmit.cpp>
  +<helpers/esp32/*.cpp>
lib_deps =
  ${heltec_v4_oled.lib_deps}
  ${esp32_ota.lib_deps}
  densaugeo/base64 @ ~1.4.0
  esphome/AsyncTCP-esphome @ ^2.1.4

[env:heltec_v4_terminal_chat]
extends = heltec_v4_oled
build_flags =
  ${heltec_v4_oled.build_flags}
  -D MAX_CONTACTS=350
  -D MAX_GROUP_CHANNELS=1
;  -D MESH_PACKET_LOGGING=1
;  -D MESH_DEBUG=1
build_src_filter = ${heltec_v4_oled.build_src_filter}
