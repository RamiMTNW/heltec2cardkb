[Heltec_lora32_v4]
extends = esp32_base
board = heltec_v4
build_flags =
  ${esp32_base.build_flags}
  ${sensor_base.build_flags}
  -I variants/heltec_v4
  -D HELTEC_LORA_V4
  -D USE_SX1262
  -D ESP32_CPU_FREQ=80
  -D RADIO_CLASS=CustomSX1262
  -D WRAPPER_CLASS=CustomSX1262Wrapper
  -D P_LORA_TX_LED=35
  -D P_LORA_DIO_1=14
  -D P_LORA_NSS=8
  -D P_LORA_RESET=12
  -D P_LORA_BUSY=13
  -D P_LORA_SCLK=9
  -D P_LORA_MISO=11
  -D P_LORA_MOSI=10
  -D P_LORA_PA_POWER=7  ; // VFEM_Ctrl -LDO power enable
  -D P_LORA_GC1109_PA_EN=2    ; // CSD - GC1109 chip enable (HIGH=on)
  -D P_LORA_GC1109_PA_TX_EN=46 ;// CPS - GC1109 PA mode (HIGH=full PA, LOW=bypass)
  -D P_LORA_KCT8103L_PA_CSD=2
  -D P_LORA_KCT8103L_PA_CTX=5
  -D PIN_USER_BTN=0
  -D PIN_VEXT_EN=36
  -D PIN_VEXT_EN_ACTIVE=HIGH
  -D LORA_TX_POWER=10 ;If it is configured as 10 here, the final output will be 22 dbm.
  -D MAX_LORA_TX_POWER=22 ; Max SX1262 output
  -D SX126X_REGISTER_PATCH=1       ; Patch register 0x8B5 for improved RX
  -D SX126X_DIO2_AS_RF_SWITCH=true ; GC1109 CTX is controlled by SX1262 DIO2
  -D SX126X_DIO3_TCXO_VOLTAGE=1.8
  -D SX126X_CURRENT_LIMIT=140
  -D SX126X_RX_BOOSTED_GAIN=1      ; In some cases, commenting this out will improve RX
  -D PIN_GPS_RX=38
  -D PIN_GPS_TX=39
  -D PIN_GPS_RESET=42
  -D PIN_GPS_RESET_ACTIVE=LOW
  -D PIN_GPS_EN=34
  -D PIN_GPS_EN_ACTIVE=LOW
  -D ENV_INCLUDE_GPS=1
  -D PIN_ADC_CTRL=37
  -D PIN_VBAT_READ=1
build_src_filter = ${esp32_base.build_src_filter}
  +<../variants/heltec_v4>
  +<helpers/sensors>
lib_deps =
  ${esp32_base.lib_deps}
  ${sensor_base.lib_deps}

[heltec_v4_oled]
extends = Heltec_lora32_v4
build_flags =
  ${Heltec_lora32_v4.build_flags}
  -D HELTEC_LORA_V4_OLED
  -D PIN_BOARD_SDA=17
  -D PIN_BOARD_SCL=18
  -D PIN_OLED_RESET=21
build_src_filter= ${Heltec_lora32_v4.build_src_filter}
lib_deps = ${Heltec_lora32_v4.lib_deps}

[heltec_v4_tft]
extends = Heltec_lora32_v4
build_flags =
  ${Heltec_lora32_v4.build_flags}
  -D HELTEC_LORA_V4_TFT
  -D PIN_BOARD_SDA=4
  -D PIN_BOARD_SCL=3
  -D DISPLAY_ROTATION=2
  -D DISPLAY_SCALE_X=1.875
  -D DISPLAY_SCALE_Y=5
  -D PIN_TFT_RST=18
  -D PIN_TFT_VDD_CTL=-1
  -D PIN_TFT_LEDA_CTL=21
  -D PIN_TFT_LEDA_CTL_ACTIVE=HIGH
  -D PIN_TFT_CS=15
  -D PIN_TFT_DC=16
  -D PIN_TFT_SCL=17
  -D PIN_TFT_SDA=33
build_src_filter= ${Heltec_lora32_v4.build_src_filter}
lib_deps = 
  ${Heltec_lora32_v4.lib_deps}
  adafruit/Adafruit ST7735 and ST7789 Library @ ^1.11.0

; Capacitive touch (CHSC6x) for Heltec V4 expansion kit touchscreen — pins per Meshtastic heltec-v4-tft / Heltec docs
[heltec_v4_tft_touch]
extends = heltec_v4_tft
build_flags =
  ${heltec_v4_tft.build_flags}
  -D DISPLAY_ROTATION=2
  -D HAS_HELTEC_V4_CAP_TOUCH=1
  -D PIN_TOUCH_SDA=47
  -D PIN_TOUCH_SCL=48
  -D PIN_TOUCH_RST=44
lib_deps =
  ${heltec_v4_tft.lib_deps}
  https://github.com/Quency-D/chsc6x/archive/5cbead829d6b432a8d621ed1aafd4eb474fd4f27.zip

[env:heltec_v4_repeater]
extends = heltec_v4_oled
build_flags =
  ${heltec_v4_oled.build_flags}
  -D FIRMWARE_VERSION='"v1.15.0.0-repeater"'
  -D DISPLAY_CLASS=SSD1306Display
  -D ADVERT_NAME='"Heltec Repeater"'
  -D ADVERT_LAT=0.0
  -D ADVERT_LON=0.0
  -D ADMIN_PASSWORD='"password"'
  -D MAX_NEIGHBOURS=50
;  -D MESH_PACKET_LOGGING=1
;  -D MESH_DEBUG=1
build_src_filter = ${heltec_v4_oled.build_src_filter}
  +<helpers/ui/SSD1306Display.cpp>
  +<../examples/simple_repeater>
lib_deps =
  ${heltec_v4_oled.lib_deps}
  ${esp32_ota.lib_deps}
  bakercp/CRC32 @ ^2.0.0

[env:heltec_v4_repeater_tcp]
extends = heltec_v4_oled
build_flags =
  ${heltec_v4_oled.build_flags}
  -D FIRMWARE_VERSION='"v1.15.0.2-repeater-tcp"'
  -D DISPLAY_CLASS=SSD1306Display
  -D ADVERT_NAME='"Heltec Repeater"'
  -D ADVERT_LAT=0.0
  -D ADVERT_LON=0.0
  -D ADMIN_PASSWORD='"password"'
  -D MAX_NEIGHBOURS=50
  -D REPEATER_TCP_COMPANION=1
  -D TCP_PORT=5000
  -D WS_PORT=8765
; Companion WebSocket is plain ws:// on 8765 (WSS removed — smaller firmware, more RAM for HTTPS OTA).
; Optional compile-time WiFi fallback (runtime NVS from meshcomod/USB is primary):
;  -D WIFI_SSID='"myssid"'
;  -D WIFI_PWD='"mypwd"'
  -I examples/repeater_tcp
  -I examples/simple_repeater
build_src_filter = ${heltec_v4_oled.build_src_filter}
  +<helpers/ui/SSD1306Display.cpp>
  +<../examples/simple_repeater>
  -<../examples/simple_repeater/main.cpp>
  +<../examples/repeater_tcp/main.cpp>
  +<helpers/esp32/TCPCompanionServer.cpp>
  +<helpers/esp32/WebSocketCompanionServer.cpp>
lib_deps =
  ${heltec_v4_oled.lib_deps}
  ${esp32_ota.lib_deps}
  bakercp/CRC32 @ ^2.0.0

